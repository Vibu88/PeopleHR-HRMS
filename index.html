<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PeopleHR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --g:#16a87c;--gd:#0d7a59;--gl:#e6f7f2;--gt:#d0f0e6;
  --r:#e53e3e;--rl:#fff0f0;--a:#d97706;--al:#fffbeb;
  --b:#2563eb;--bl:#eff6ff;--p:#7c3aed;--pl:#f5f3ff;
  --n50:#f9fafb;--n100:#f3f4f6;--n200:#e5e7eb;--n300:#d1d5db;
  --n400:#9ca3af;--n500:#6b7280;--n600:#4b5563;--n700:#374151;--n800:#1f2937;--n900:#111827;
  --rad:10px;--radl:14px;--radx:18px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shm:0 4px 12px rgba(0,0,0,.08);--shl:0 10px 30px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--n800);background:var(--n50)}

/* ── LOGIN ── */
.login-page{display:flex;height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0fdf4 0%,#e6f7f2 50%,#eff6ff 100%)}
.login-box{background:#fff;border-radius:var(--radx);border:1px solid var(--n200);padding:40px;width:400px;box-shadow:var(--shl)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px;justify-content:center}
.login-logo-mark{width:40px;height:40px;background:linear-gradient(135deg,var(--g),var(--gd));border-radius:12px;display:flex;align-items:center;justify-content:center}
.login-logo-mark svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}
.login-logo-text{font-size:22px;font-weight:700;color:var(--n900);letter-spacing:-.5px}
.login-logo-text span{color:var(--g)}
.login-title{font-size:18px;font-weight:600;color:var(--n900);margin-bottom:4px;text-align:center}
.login-sub{font-size:13px;color:var(--n500);margin-bottom:24px;text-align:center}
.login-fg{margin-bottom:16px}
.login-fg label{display:block;font-size:12px;font-weight:500;color:var(--n600);margin-bottom:5px}
.login-fg input{width:100%;padding:10px 12px;border:1px solid var(--n300);border-radius:var(--rad);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s}
.login-fg input:focus{border-color:var(--g)}
.login-btn{width:100%;padding:11px;background:var(--g);color:#fff;border:none;border-radius:var(--rad);font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;margin-top:4px}
.login-btn:hover{background:var(--gd)}
.login-err{background:var(--rl);border:1px solid #fecaca;border-radius:var(--rad);padding:9px 12px;font-size:12px;color:var(--r);margin-bottom:14px;display:none}
.login-creds{background:var(--n50);border:1px solid var(--n200);border-radius:var(--rad);padding:12px;margin-top:18px}
.login-creds-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--n400);margin-bottom:8px}
.cred-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11.5px}
.cred-role{font-weight:500;color:var(--n700)}
.cred-email{font-family:'DM Mono',monospace;font-size:11px;color:var(--n500);cursor:pointer}
.cred-email:hover{color:var(--g)}

/* ── APP ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:230px;background:#fff;border-right:1px solid var(--n200);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:16px 14px 12px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--n100)}
.logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--g),var(--gd));border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:14px;height:14px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}
.logo-text{font-size:14px;font-weight:700;color:var(--n900);letter-spacing:-.3px}
.logo-text span{color:var(--g)}
.user-info{margin:10px 8px;background:var(--n50);border:1px solid var(--n200);border-radius:var(--rad);padding:10px 12px;display:flex;align-items:center;gap:9px}
.user-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.user-name{font-size:12px;font-weight:500;color:var(--n800);line-height:1.3}
.user-role{font-size:10px;color:var(--n500)}
.role-badge{display:inline-flex;padding:1px 6px;border-radius:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.rb-admin{background:#dcfce7;color:#166534}.rb-manager{background:#dbeafe;color:#1e40af}.rb-employee{background:#fef3c7;color:#92400e}
.nsec{padding:10px 10px 2px 14px;font-size:10px;font-weight:600;color:var(--n400);text-transform:uppercase;letter-spacing:.08em}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:1px 6px;border-radius:var(--rad);cursor:pointer;font-size:12.5px;color:var(--n600);transition:all .15s}
.ni:hover{background:var(--n50);color:var(--n800)}
.ni.active{background:var(--gl);color:var(--gd);font-weight:500}
.ni svg{width:14px;height:14px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}
.nbadge{margin-left:auto;min-width:17px;height:17px;background:var(--r);color:#fff;font-size:9px;font-weight:700;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.nbadge.am{background:var(--a)}.nbadge.gn{background:var(--g)}
.logout-btn{margin:8px;border:none;background:var(--n50);border-radius:var(--rad);padding:8px 12px;font-size:12px;color:var(--n600);cursor:pointer;width:calc(100% - 16px);text-align:left;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px;transition:background .15s}
.logout-btn:hover{background:var(--rl);color:var(--r)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:0 20px;height:54px;background:#fff;border-bottom:1px solid var(--n200);display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-size:14px;font-weight:600;color:var(--n900);flex:1;letter-spacing:-.3px}
.srch{display:flex;align-items:center;gap:7px;background:var(--n50);border:1px solid var(--n200);border-radius:var(--rad);padding:6px 10px}
.srch input{border:none;background:transparent;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;color:var(--n800);width:140px}
.content{flex:1;overflow-y:auto;padding:20px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rad);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--n200);background:#fff;color:var(--n700);font-family:'DM Sans',sans-serif;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--n50)}
.btn-p{background:var(--g);color:#fff;border-color:var(--g)}.btn-p:hover{background:var(--gd)}
.btn-r{background:var(--r);color:#fff;border-color:var(--r)}.btn-r:hover{background:#c53030}
.btn-a{background:var(--a);color:#fff;border-color:var(--a)}
.btn-b{background:var(--b);color:#fff;border-color:var(--b)}
.btn-sm{padding:4px 9px;font-size:11.5px}.btn-xs{padding:3px 7px;font-size:11px}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}
.sc{background:#fff;border:1px solid var(--n200);border-radius:var(--radl);padding:14px 16px;box-shadow:var(--sh)}
.sc-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.sc-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round}
.sc-val{font-size:22px;font-weight:600;color:var(--n900);letter-spacing:-.5px;line-height:1}
.sc-label{font-size:11.5px;color:var(--n500);margin-top:3px}
.card{background:#fff;border:1px solid var(--n200);border-radius:var(--radl);box-shadow:var(--sh);overflow:hidden;margin-bottom:14px}
.card-h{padding:11px 14px;border-bottom:1px solid var(--n100);font-size:12.5px;font-weight:600;color:var(--n800);display:flex;align-items:center;gap:8px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{background:var(--n50);padding:7px 12px;text-align:left;font-size:10.5px;font-weight:600;color:var(--n500);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--n200);white-space:nowrap}
tbody td{padding:9px 12px;border-bottom:1px solid var(--n100);color:var(--n700);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--n50)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10.5px;font-weight:600;white-space:nowrap}
.bg{background:var(--gl);color:var(--gd)}.br{background:var(--rl);color:var(--r)}.ba{background:var(--al);color:var(--a)}.bb{background:var(--bl);color:var(--b)}.bp{background:var(--pl);color:var(--p)}.bgr{background:var(--n100);color:var(--n500)}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.av-lg{width:42px;height:42px;font-size:14px}
.ecc{display:flex;align-items:center;gap:8px}
.ecn{font-size:12.5px;font-weight:500;color:var(--n900)}
.ecs{font-size:11px;color:var(--n400)}
.clock-big{font-family:'DM Mono',monospace;font-size:38px;font-weight:500;color:var(--n900);letter-spacing:-1px;line-height:1}
.clock-date{font-size:12px;color:var(--n400);margin-top:3px}
.tcard{background:#fff;border:1px solid var(--n200);border-radius:var(--radl);padding:13px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.tcard:hover{border-color:var(--n300);box-shadow:var(--shm)}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:11px}
.btn-cin{background:var(--g);color:#fff;border:none;border-radius:var(--radl);padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:7px;transition:all .2s;box-shadow:0 2px 8px rgba(22,168,124,.3)}
.btn-cin:hover{background:var(--gd);transform:translateY(-1px)}
.btn-cout{background:var(--r);color:#fff;border:none;border-radius:var(--radl);padding:11px 22px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:7px;transition:all .2s;box-shadow:0 2px 8px rgba(229,62,62,.3)}
.btn-cout:hover{background:#c53030;transform:translateY(-1px)}
.btn-cin svg,.btn-cout svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}
.prog{height:5px;background:var(--n200);border-radius:3px;overflow:hidden;margin-top:4px}
.prog-f{height:100%;border-radius:3px;background:var(--g);transition:width .5s}
.tab-bar{display:flex;gap:2px;background:var(--n100);border-radius:var(--rad);padding:3px;width:fit-content;margin-bottom:13px}
.tab{padding:5px 13px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;color:var(--n500);transition:all .15s}
.tab.active{background:#fff;color:var(--n800);box-shadow:var(--sh)}
.notice{background:var(--bl);border:1px solid #bfdbfe;border-radius:var(--rad);padding:9px 12px;font-size:12px;color:#1e40af;margin-bottom:12px;display:flex;align-items:flex-start;gap:7px}
.notice svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;flex-shrink:0;margin-top:1px}
.panel{position:fixed;right:0;top:0;height:100%;width:340px;background:#fff;border-left:1px solid var(--n200);overflow-y:auto;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:200;display:flex;flex-direction:column;box-shadow:var(--shl)}
.panel.open{transform:translateX(0)}
.panel-h{padding:13px 16px;border-bottom:1px solid var(--n200);display:flex;align-items:center;font-size:13.5px;font-weight:600;flex-shrink:0}
.panel-b{padding:16px;flex:1;overflow-y:auto}
.dsec{margin-bottom:14px}
.dsec-t{font-size:10px;font-weight:700;color:var(--n400);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--n100);font-size:12.5px}
.drow:last-child{border-bottom:none}
.dk{color:var(--n500)}.dv{font-weight:500;color:var(--n800);text-align:right}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(17,24,39,.45);z-index:400;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:var(--radx);border:1px solid var(--n200);width:460px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shl)}
.modal-h{padding:15px 18px;border-bottom:1px solid var(--n100);display:flex;align-items:center;font-size:14px;font-weight:600}
.modal-b{padding:18px;flex:1;overflow-y:auto}
.modal-f{padding:12px 18px;border-top:1px solid var(--n100);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.fg{margin-bottom:12px}.fg label{display:block;font-size:11.5px;font-weight:500;color:var(--n600);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:7px 10px;border:1px solid var(--n300);border-radius:var(--rad);font-size:12.5px;font-family:'DM Sans',sans-serif;color:var(--n800);background:#fff;outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--g)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.ps-top{background:linear-gradient(135deg,var(--g),var(--gd));padding:14px 16px;color:#fff}
.ps-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12.5px;border-bottom:1px solid var(--n100)}
.ps-row:last-child{border-bottom:none}
.ps-net{background:var(--gl);border-radius:var(--rad);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.emp-self-card{background:#fff;border:1px solid var(--n200);border-radius:var(--radl);padding:20px;box-shadow:var(--sh);margin-bottom:16px}
.big-timer{font-family:'DM Mono',monospace;font-size:52px;font-weight:500;line-height:1;letter-spacing:-2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--g);display:inline-block;animation:pulse 1.5s infinite;margin-right:5px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--n900);color:#fff;padding:10px 16px;border-radius:var(--rad);font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--g)}.toast.error{background:var(--r)}
.bal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.bal-card{background:var(--n50);border:1px solid var(--n200);border-radius:var(--radl);padding:14px;text-align:center}
.bal-num{font-size:28px;font-weight:600;color:var(--n900);letter-spacing:-.5px}
.bal-label{font-size:11px;color:var(--n500);margin-top:3px}
.bal-bar{height:5px;background:var(--n200);border-radius:3px;margin-top:8px}
.bal-fill{height:100%;border-radius:3px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--n200);border-radius:10px}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="auth-page" class="login-page" style="display:none">
  <div class="login-box" id="auth-box">
    <div class="login-logo">
      <div class="login-logo-mark"><svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="2"/><rect x="9" y="2" width="5" height="5" rx="2"/><path d="M2 13c0-2.5 2-3.5 4-3.5s4 1 4 3.5"/></svg></div>
      <span class="login-logo-text">People<span>HR</span></span>
    </div>

    <!-- REGISTER FORM -->
    <div id="register-form" style="display:none">
      <div class="login-title">Set up your company</div>
      <div class="login-sub">Create your Admin account to get started</div>
      <div class="login-err" id="reg-err"></div>
      <div class="login-fg"><label>Company name *</label><input type="text" id="reg-company" placeholder="e.g. Acme Technologies Pvt Ltd"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="login-fg"><label>First name *</label><input type="text" id="reg-fn" placeholder="First name"></div>
        <div class="login-fg"><label>Last name *</label><input type="text" id="reg-ln" placeholder="Last name"></div>
      </div>
      <div class="login-fg"><label>Work email *</label><input type="email" id="reg-email" placeholder="admin@yourcompany.com"></div>
      <div class="login-fg"><label>Password *</label><input type="password" id="reg-pwd" placeholder="Min 6 characters"></div>
      <button class="login-btn" onclick="doRegister()" id="reg-btn">Create admin account</button>
      <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--n400)">
        Already have an account? <span onclick="showLogin()" style="color:var(--g);cursor:pointer;font-weight:500">Sign in</span>
      </div>
    </div>

    <!-- LOGIN FORM -->
    <div id="login-form" style="display:none">
      <div class="login-title">Welcome back</div>
      <div class="login-sub">Sign in to your account</div>
      <div class="login-err" id="login-err"></div>
      <div class="login-fg"><label>Work email</label><input type="email" id="login-email" placeholder="you@company.com"></div>
      <div class="login-fg"><label>Password</label><input type="password" id="login-pwd" placeholder="Enter password"></div>
      <button class="login-btn" onclick="doLogin()" id="login-btn">Sign in</button>
      <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--n400)">
        New setup? <span onclick="showRegister()" style="color:var(--g);cursor:pointer;font-weight:500">Create admin account</span>
      </div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="main-app" style="display:none">
<div class="sidebar">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 16 16"><rect x="2" y="2" width="5" height="5" rx="2"/><rect x="9" y="2" width="5" height="5" rx="2"/><path d="M2 13c0-2.5 2-3.5 4-3.5s4 1 4 3.5"/></svg></div>
    <span class="logo-text">People<span>HR</span></span>
  </div>
  <div class="user-info" id="user-info-box"></div>
  <div id="sidebar-nav"></div>
  <button class="logout-btn" onclick="logout()" style="margin-top:auto">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l4-4-4-4M14 7H6"/></svg>
    Sign out
  </button>
</div>
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="page-title">Dashboard</div>
    <div class="srch" id="srch-wrap"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="var(--n400)" stroke-width="2" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="4.5"/><path d="M10.5 10.5L14 14"/></svg><input id="srch" placeholder="Search..." oninput="renderMod()"></div>
    <div id="tb-actions"></div>
  </div>
  <div class="content" id="content"></div>
</div>
</div>

<div class="panel" id="panel">
  <div class="panel-h" id="panel-h">Details<button class="btn btn-sm" style="margin-left:auto" onclick="closePanel()">✕</button></div>
  <div class="panel-b" id="panel-b"></div>
</div>
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-h" id="modal-h">Modal<button class="btn btn-sm" style="margin-left:auto" onclick="closeModal()">✕</button></div>
    <div class="modal-b" id="modal-b"></div>
    <div class="modal-f" id="modal-f"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = '/api';
let TOKEN = '';
let ME = null;
let curMod = 'dashboard';
let liveInt = null, panelInt = null;
let sessions = {}, empCache = [], settingsCache = {};

const AC = [{bg:'#dcfce7',c:'#166534'},{bg:'#dbeafe',c:'#1e40af'},{bg:'#fef3c7',c:'#92400e'},{bg:'#fce7f3',c:'#9d174d'},{bg:'#ede9fe',c:'#5b21b6'},{bg:'#ffedd5',c:'#9a3412'},{bg:'#cffafe',c:'#164e63'},{bg:'#f0fdf4',c:'#14532d'},{bg:'#fef9c3',c:'#854d0e'},{bg:'#f1f5f9',c:'#475569'}];
const ac=id=>AC[Math.abs(id||0)%AC.length];
const ini=n=>n?n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';
const fmt=n=>'₹'+Number(n||0).toLocaleString('en-IN');
const fd=d=>{if(!d)return'—';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`};
const today=()=>new Date().toISOString().split('T')[0];
const fmtDur=s=>{if(!s||s<0)return'00:00:00';return`${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;};
const fmtClock=d=>`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
const fmtDateLong=d=>{const ds=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],ms=['January','February','March','April','May','June','July','August','September','October','November','December'];return`${ds[d.getDay()]}, ${d.getDate()} ${ms[d.getMonth()]} ${d.getFullYear()}`;};

// ── API ──────────────────────────────────────────────────────────────────────
async function api(path, method='GET', body=null) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const json = await r.json();
  if (r.status === 401) { logout(); return null; }
  if (!json.success) { showToast(json.error || 'Error', 'error'); throw new Error(json.error); }
  return json.data;
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 2800);
}

// On page load: check localStorage cache first, then verify token is still valid
async function bootApp() {
  const cachedToken = localStorage.getItem('phr_token');
  const cachedMe = localStorage.getItem('phr_me');

  if (cachedToken && cachedMe) {
    // Token exists in cache — verify it's still valid with server
    TOKEN = cachedToken;
    try {
      const me = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${TOKEN}` } });
      const json = await me.json();
      if (json.success) {
        // Token valid — restore session, skip login page entirely
        ME = json.data;
        localStorage.setItem('phr_me', JSON.stringify(ME));
        initApp();
        return;
      }
    } catch(e) {}
    // Token invalid/expired — clear cache and show login
    localStorage.removeItem('phr_token');
    localStorage.removeItem('phr_me');
    TOKEN = ''; ME = null;
  }

  // No valid cache — check if this is first run (no admin exists)
  try {
    const res = await fetch('/api/auth/check-setup');
    const json = await res.json();
    if (json.success && !json.data.setup_done) {
      showRegister(); // First time ever — show registration
    } else {
      showLogin(); // Admin exists — show login
    }
  } catch(e) {
    showLogin(); // Server error fallback
  }
}

async function doRegister() {
  const btn = document.getElementById('reg-btn');
  const errEl = document.getElementById('reg-err');
  const company = document.getElementById('reg-company').value.trim();
  const fn = document.getElementById('reg-fn').value.trim();
  const ln = document.getElementById('reg-ln').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pwd = document.getElementById('reg-pwd').value;

  if (!company || !fn || !ln || !email || !pwd) {
    errEl.textContent = 'All fields are required'; errEl.style.display = 'block'; return;
  }
  if (pwd.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters'; errEl.style.display = 'block'; return;
  }

  btn.textContent = 'Creating account...'; btn.disabled = true;
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company_name: company, first_name: fn, last_name: ln, email, password: pwd })
    });
    const json = await res.json();
    if (!json.success) {
      errEl.textContent = json.error || 'Registration failed';
      errEl.style.display = 'block';
      btn.textContent = 'Create admin account'; btn.disabled = false;
      return;
    }
    // Success — save token and enter app
    TOKEN = json.data.token; ME = json.data.user;
    localStorage.setItem('phr_token', TOKEN);
    localStorage.setItem('phr_me', JSON.stringify(ME));
    showToast('Welcome to PeopleHR! Account created ✓');
    initApp();
  } catch(e) {
    errEl.textContent = 'Server error. Make sure the app is running.';
    errEl.style.display = 'block';
    btn.textContent = 'Create admin account'; btn.disabled = false;
  }
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-pwd').value;
  const errEl = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  if (!email || !pwd) { errEl.textContent = 'Please enter email and password'; errEl.style.display = 'block'; return; }
  btn.textContent = 'Signing in...'; btn.disabled = true;
  try {
    const res = await fetch('/api/auth/login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({email, password: pwd}) });
    const json = await res.json();
    if (!json.success) {
      errEl.textContent = json.error || 'Invalid email or password';
      errEl.style.display = 'block'; btn.textContent = 'Sign in'; btn.disabled = false; return;
    }
    // Save token + user info in localStorage (this is the cache)
    TOKEN = json.data.token; ME = json.data.user;
    localStorage.setItem('phr_token', TOKEN);
    localStorage.setItem('phr_me', JSON.stringify(ME));
    errEl.style.display = 'none';
    initApp();
  } catch(e) {
    errEl.textContent = 'Server error. Make sure the app is running.';
    errEl.style.display = 'block'; btn.textContent = 'Sign in'; btn.disabled = false;
  }
}

function logout() {
  TOKEN = ''; ME = null;
  localStorage.removeItem('phr_token');
  localStorage.removeItem('phr_me');
  document.getElementById('main-app').style.display = 'none';
  stopInts();
  bootApp(); // Re-run boot — will show login (not register since admin exists)
}

function nav(el, mod) {
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
  const target = el || document.querySelector(`[data-m="${mod}"]`);
  if (target) target.classList.add('active');
  curMod = mod;
  document.getElementById('srch').value = '';
  closePanel(); stopInts();
  renderMod();
}

function renderMod() {
  document.getElementById('page-title').textContent = TITLES[curMod] || curMod;
  const ta = document.getElementById('tb-actions'); ta.innerHTML = '';
  if (curMod==='employees'&&(ME.role==='admin')) ta.innerHTML='<button class="btn btn-p btn-sm" onclick="openEmpModal()">+ Add employee</button>';

  if (curMod==='users'&&ME.role==='admin') ta.innerHTML='<button class="btn btn-p btn-sm" onclick="openUserModal()">+ Add user</button>';
  const map = {dashboard:renderDashboard,employees:renderEmployees,orgtree:renderOrgTree,attendance:renderAttendance,attsummary:renderAttSummary,shifts:renderShifts,leave:renderLeave,leavebal:renderLeaveBalance,salary:renderSalary,payroll:renderPayroll,payslip:renderPayslips,users:renderUsers,settings:renderSettings,profile:renderProfile};

}

function startSelfTimer() {

async function attTab(el, tab) {

}

function renderTeamCard(e) {

    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--n400);margin-bottom:5px"><span>In: <strong style="color:var(--n600)">${ci}</strong></span><span>Out: <strong style="color:var(--n600)">${co}</strong></span></div>
    <div style="font-size:10px;color:var(--n400);display:flex;justify-content:space-between;margin-bottom:2px"><span>Worked</span><span class="tc-t-${e.id}" style="font-family:'DM Mono',monospace;font-weight:500;color:${clocked?'var(--g)':'var(--n400)'}">${fmtDur(ws)}</span></div>
    <div class="prog"><div class="prog-f tc-p-${e.id}" style="width:${pct}%"></div></div>

function isClockedIn(id){const s=sessions[id];return s&&s.clock_in_at&&!s.clock_out_at;}
function getLiveWs(id){const s=sessions[id];if(!s)return 0;if(s.clock_out_at)return s.worked_seconds||0;if(s.clock_in_at)return Math.floor((Date.now()-new Date(s.clock_in_at))/1000);return 0;}

function startLiveClock() {
  if (liveInt) clearInterval(liveInt);
  liveInt = setInterval(() => {
    const wc=document.getElementById('wall-clock'),wd=document.getElementById('wall-date');
    if(wc) wc.textContent=fmtClock(new Date());
    if(wd) wd.textContent=fmtDateLong(new Date());
    empCache.forEach(e=>{

      const t=document.querySelector(`.tc-t-${e.id}`),p=document.querySelector(`.tc-p-${e.id}`);
      if(t){t.textContent=fmtDur(ws);t.style.color=clocked?'var(--g)':'var(--n400)';}
      if(p) p.style.width=Math.min(100,Math.round(ws/(9*3600)*100))+'%';
    });
  }, 1000);
}

async function saveMarkAtt(){
  const d=document.getElementById('af-d').value; if(!d){showToast('Date required','error');return;}
  const ci=document.getElementById('af-i').value,co=document.getElementById('af-o').value;
  let ws=0; if(ci&&co){const[ih,im]=ci.split(':').map(Number);const[oh,om]=co.split(':').map(Number);ws=Math.max(0,(oh*60+om-ih*60-im)*60);}
  await api('/attendance','POST',{employee_id:document.getElementById('af-e').value,date:d,status:document.getElementById('af-s').value,check_in:ci,check_out:co,worked_seconds:ws,note:document.getElementById('af-n').value});
  closeModal(); showToast('Attendance saved');
}

// ── SALARY ───────────────────────────────────────────────────────────────────
async function renderSalary(){
  const[emps,settings]=await Promise.all([api('/employees'),api('/settings')]);
  const pfR=parseFloat(settings?.pf_rate||12),tdsR=parseFloat(settings?.tds_rate||10);
  function calc(basic){const hra=Math.round(basic*.4),ta=2000,sp=Math.round(basic*.1),gross=basic+hra+ta+sp,pf=Math.round(basic*(pfR/100)),esi=gross<=21000?Math.round(gross*.0075):0,tds=Math.round((gross-pf-esi)*(tdsR/100)/12);return{hra,ta,sp,gross,pf,esi,tds,net:gross-pf-esi-tds};}
  const q=document.getElementById('srch').value.toLowerCase();
  const list=q?(emps||[]).filter(e=>(e.first_name+' '+e.last_name).toLowerCase().includes(q)):(emps||[]);
  document.getElementById('content').innerHTML=`
    <div class="notice"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 7v4M8 5.5v.5"/></svg>HRA=40%, TA=₹2,000, Special=10%. PF=${pfR}%, TDS=${tdsR}% p.a.</div>
    <div class="card"><table>
      <thead><tr><th>Employee</th><th>Basic</th><th>HRA</th><th>TA</th><th>Special</th><th>Gross</th><th>PF</th><th>TDS</th><th>Net pay</th></tr></thead>
      <tbody>${list.map(e=>{const s=calc(e.basic_salary);return`<tr>
        <td><div class="ecc"><div class="av" style="background:${ac(e.id).bg};color:${ac(e.id).c}">${ini(e.first_name+' '+e.last_name)}</div><div><div class="ecn">${e.first_name} ${e.last_name}</div><div class="ecs">${e.department}</div></div></div></td>
        <td>${fmt(e.basic_salary)}</td><td>${fmt(s.hra)}</td><td>${fmt(s.ta)}</td><td>${fmt(s.sp)}</td>
        <td style="font-weight:600">${fmt(s.gross)}</td><td style="color:var(--r)">${fmt(s.pf)}</td><td style="color:var(--r)">${fmt(s.tds)}</td>
        <td style="font-weight:700;color:var(--g)">${fmt(s.net)}</td>
      </tr>`;}).join('')}</tbody></table></div>`;
}

// ── PAYROLL ───────────────────────────────────────────────────────────────────
async function renderPayroll(){
  const payrolls=await api('/payroll')||[];
  const months=[...new Set(payrolls.map(p=>p.month))].sort().reverse();
  document.getElementById('content').innerHTML=`
    <div class="stats">
      <div class="sc"><div class="sc-icon" style="background:var(--gl);color:var(--g)"><svg viewBox="0 0 16 16"><path d="M13 5l-7 7-3-3"/></svg></div><div class="sc-val">${payrolls.filter(p=>p.status==='Paid').length}</div><div class="sc-label">Paid records</div></div>
      <div class="sc"><div class="sc-icon" style="background:var(--al);color:var(--a)"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg></div><div class="sc-val" style="color:var(--a)">${payrolls.filter(p=>p.status==='Processing').length}</div><div class="sc-label">Processing</div></div>
      <div class="sc"><div class="sc-icon" style="background:var(--n100);color:var(--n500)"><svg viewBox="0 0 16 16"><path d="M4 2h8l3 3v9H1V2h3"/></svg></div><div class="sc-val">${payrolls.filter(p=>p.status==='Draft').length}</div><div class="sc-label">Drafts</div></div>
      <div class="sc"><div class="sc-icon" style="background:var(--bl);color:var(--b)"><svg viewBox="0 0 16 16"><rect x="1" y="4" width="14" height="10" rx="1.5"/><path d="M1 8h14"/></svg></div><div class="sc-val" style="font-size:14px">${fmt(payrolls.filter(p=>p.status==='Paid').reduce((s,p)=>s+p.net_pay,0))}</div><div class="sc-label">Total disbursed</div></div>
    </div>
    ${months.map(m=>{
      const recs=payrolls.filter(p=>p.month===m);const[yr,mo]=m.split('-');const mn=new Date(yr,parseInt(mo)-1).toLocaleString('default',{month:'long'});
      const st=recs[0]?.status||'Draft',totalNet=recs.reduce((s,p)=>s+p.net_pay,0);
      return`<div class="card" style="margin-bottom:13px">
        <div class="card-h">${mn} ${yr} <span class="badge ${st==='Paid'?'bg':st==='Processing'?'ba':'bgr'}" style="margin-left:8px">${st}</span><span style="margin-left:auto;font-size:12px;color:var(--n400)">Total: ${fmt(totalNet)}</span></div>
        <table><thead><tr><th>Employee</th><th>Basic</th><th>Gross</th><th>PF</th><th>TDS</th><th>Net</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>${recs.map(p=>`<tr>
          <td><div class="ecc"><div class="av" style="background:${ac(p.employee_id).bg};color:${ac(p.employee_id).c}">${ini(p.first_name+' '+p.last_name)}</div><span class="ecn">${p.first_name} ${p.last_name}</span></div></td>
          <td>${fmt(p.basic)}</td><td>${fmt(p.gross)}</td><td style="color:var(--r)">${fmt(p.pf_deduction)}</td><td style="color:var(--r)">${fmt(p.tds_deduction)}</td>
          <td style="font-weight:700;color:var(--g)">${fmt(p.net_pay)}</td>
          <td><span class="badge ${p.status==='Paid'?'bg':p.status==='Processing'?'ba':'bgr'}">${p.status}</span></td>
          <td style="white-space:nowrap">
            ${p.status==='Draft'?`<button class="btn btn-xs btn-p" onclick="payAct(${p.id},'Processing')">Process</button>`:''}
            ${p.status==='Processing'?`<button class="btn btn-xs btn-p" onclick="payAct(${p.id},'Paid')">Mark paid</button> <button class="btn btn-xs" onclick="payAct(${p.id},'Draft')">Rollback</button>`:''}
            ${p.status==='Paid'?`<button class="btn btn-xs" onclick="viewPayslip(${p.employee_id},'${m}')">Payslip</button>`:''}
          </td>
        </tr>`).join('')}</tbody></table></div>`;
    }).join('')}`;
}
async function payAct(id,status){await api(`/payroll/${id}/status`,'PUT',{status});showToast(`${status}`);renderPayroll();}
async function openPayrollModal(){
  const now=new Date();const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  showModal('Run payroll',`<div class="fg"><label>Month *</label><input type="month" id="pm-m" value="${ym}"></div><div class="notice"><svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 7v4M8 5.5v.5"/></svg>Drafts auto-calculated for all active employees.</div>`,
    [['Cancel','closeModal()'],['Generate drafts','runPayroll()']]
  );
}
async function runPayroll(){
  const month=document.getElementById('pm-m').value;if(!month){showToast('Select month','error');return;}
  const result=await api('/payroll/run','POST',{month});closeModal();showToast(`${result.created} drafts created`);renderPayroll();
}

    <thead><tr><th>Employee</th><th>Month</th><th>Gross</th><th>Deductions</th><th>Net pay</th><th></th></tr></thead>
    <tbody>${payrolls.map(p=>{const[yr,mo]=p.month.split('-');const mn=new Date(yr,parseInt(mo)-1).toLocaleString('default',{month:'long'});return`<tr>
      <td><div class="ecc"><div class="av" style="background:${ac(p.employee_id).bg};color:${ac(p.employee_id).c}">${ini(p.first_name+' '+p.last_name)}</div><span class="ecn">${p.first_name} ${p.last_name}</span></div></td>
      <td style="font-weight:500">${mn} ${yr}</td><td>${fmt(p.gross)}</td>

async function viewPayslip(empId,month){
  const ps=await api(`/payroll/payslip/${empId}/${month}`);if(!ps)return;
  const[yr,mo]=month.split('-');const mn=new Date(yr,parseInt(mo)-1).toLocaleString('default',{month:'long'});
  const c=ac(ps.employee_id||empId);
  document.getElementById('panel-h').innerHTML=`Payslip — ${mn} ${yr} <button class="btn btn-sm" style="margin-left:auto" onclick="closePanel()">✕</button>`;
  document.getElementById('panel-b').innerHTML=`
    <div style="border:1px solid var(--n200);border-radius:var(--radl);overflow:hidden">
      <div class="ps-top"><div style="font-size:13px;font-weight:700">${ps.company_name||'Company'}</div><div style="font-size:11px;opacity:.8">Salary slip · ${mn} ${yr}</div></div>
      <div style="padding:14px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:13px;padding-bottom:11px;border-bottom:1px solid var(--n100)">
          <div class="av av-lg" style="background:${c.bg};color:${c.c}">${ini(ps.first_name+' '+ps.last_name)}</div>
          <div><div style="font-size:14px;font-weight:600">${ps.first_name} ${ps.last_name}</div><div style="font-size:11px;color:var(--n400)">${ps.emp_no} · ${ps.department}</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--n400);margin-bottom:6px">Earnings</div>
          ${[['Basic',ps.basic],['HRA',ps.hra],['Travel',ps.travel_allowance],['Special',ps.special_allowance]].map(([l,v])=>`<div class="ps-row"><span style="color:var(--n600)">${l}</span><span style="font-weight:500">${fmt(v)}</span></div>`).join('')}
          <div class="ps-row" style="font-weight:700;border-top:2px solid var(--n200);margin-top:3px;padding-top:4px"><span>Gross</span><span>${fmt(ps.gross)}</span></div></div>
          <div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--n400);margin-bottom:6px">Deductions</div>
          ${[['PF',ps.pf_deduction],['ESI',ps.esi_deduction],['TDS',ps.tds_deduction]].map(([l,v])=>`<div class="ps-row"><span style="color:var(--n600)">${l}</span><span style="color:var(--r);font-weight:500">${fmt(v)}</span></div>`).join('')}
          <div class="ps-row" style="font-weight:700;color:var(--r);border-top:2px solid var(--n200);margin-top:3px;padding-top:4px"><span>Total</span><span>${fmt(ps.pf_deduction+ps.esi_deduction+ps.tds_deduction)}</span></div></div>
        </div>
        <div class="ps-net"><div><div style="font-size:11px;font-weight:600;color:var(--gd)">Net pay</div><div style="font-size:10px;color:var(--gd);opacity:.7">${mn} ${yr}</div></div><div style="font-size:22px;font-weight:700;color:var(--g)">${fmt(ps.net_pay)}</div></div>
        <div style="text-align:center;font-size:10px;color:var(--n300);margin-top:10px">Computer-generated payslip · ${ps.company_name}</div>
      </div>
    </div>`;
  document.getElementById('panel').classList.add('open');
}

      <thead><tr><th>Employee</th><th>Email</th><th>Role</th><th>Status</th><th>Last login</th><th>Actions</th></tr></thead>
      <tbody>${users.map(u=>`<tr>
        <td><div class="ecc"><div class="av" style="background:${ac(u.id).bg};color:${ac(u.id).c}">${ini((u.first_name||'?')+' '+(u.last_name||''))}</div><span class="ecn">${u.first_name||'—'} ${u.last_name||''}</span></div></td>
        <td style="font-family:'DM Mono',monospace;font-size:11px">${u.email}</td>
        <td><span class="badge ${u.role==='admin'?'bg':u.role==='manager'?'bb':'ba'}">${u.role}</span></td>
        <td><span class="badge ${u.is_active?'bg':'br'}">${u.is_active?'Active':'Inactive'}</span></td>

        <td><button class="btn btn-sm" onclick="openEditUserModal(${u.id},'${u.role}',${u.is_active})">Edit</button></td>
      </tr>`).join('')}</tbody></table></div>`;
}
async function openUserModal(){
  const emps=await api('/employees')||[];
  const empOpts=emps.map(e=>`<option value="${e.id}">${e.first_name} ${e.last_name} (${e.emp_no})</option>`).join('');
  showModal('Add user account',`
    <div class="fg"><label>Employee</label><select id="uf-emp"><option value="">— Not linked —</option>${empOpts}</select></div>
    <div class="fg"><label>Email *</label><input type="email" id="uf-email" placeholder="employee@company.com"></div>
    <div class="fg"><label>Password *</label><input type="password" id="uf-pwd" placeholder="Min 6 characters"></div>
    <div class="fg"><label>Role</label><select id="uf-role"><option value="employee">Employee</option><option value="manager">Manager</option><option value="admin">Admin</option></select></div>`,
    [['Cancel','closeModal()'],['Create account','saveUser()']]
  );
}
async function saveUser(){
  const email=document.getElementById('uf-email').value.trim(),pwd=document.getElementById('uf-pwd').value;
  if(!email||!pwd){showToast('Email and password required','error');return;}
  await api('/users','POST',{employee_id:document.getElementById('uf-emp').value||null,email,password:pwd,role:document.getElementById('uf-role').value});
  closeModal();showToast('Account created');renderUsers();
}
async function openEditUserModal(id,role,isActive){
  showModal('Edit user',`
    <div class="fg"><label>Role</label><select id="eu-role"><option value="employee" ${role==='employee'?'selected':''}>Employee</option><option value="manager" ${role==='manager'?'selected':''}>Manager</option><option value="admin" ${role==='admin'?'selected':''}>Admin</option></select></div>
    <div class="fg"><label>Status</label><select id="eu-active"><option value="1" ${isActive?'selected':''}>Active</option><option value="0" ${!isActive?'selected':''}>Inactive</option></select></div>
    <div class="fg"><label>New password (leave blank to keep current)</label><input type="password" id="eu-pwd" placeholder="Enter new password to change"></div>`,
    [['Cancel','closeModal()'],['Save','updateUser('+id+')']]
  );
}
async function updateUser(id){
  const body={role:document.getElementById('eu-role').value,is_active:parseInt(document.getElementById('eu-active').value)};
  const pwd=document.getElementById('eu-pwd').value;if(pwd)body.password=pwd;
  await api(`/users/${id}`,'PUT',body);closeModal();showToast('User updated');renderUsers();
}

    <div class="frow"><div class="fg"><label>PF rate (%)</label><input type="number" id="s-pf" value="${s.pf_rate||12}"></div><div class="fg"><label>TDS rate (% p.a.)</label><input type="number" id="s-tds" value="${s.tds_rate||10}"></div></div>
    <div style="font-size:11px;color:var(--n400);margin-bottom:12px">ESI 0.75% auto-applied if gross ≤ ₹21,000</div>

    <div class="frow">${(s.leave_policy||[]).map((p,i)=>`<div class="fg"><label>${p.leave_type} leave (days)</label><input type="number" id="lp-${i}" value="${p.days_per_year}"></div>`).join('')}</div>
    <button class="btn btn-p" onclick="saveSettings()">Save settings</button>
  </div></div></div>`;

async function saveSettings(){
  const leave_policy=settingsCache.leave_policy.map((p,i)=>({leave_type:p.leave_type,days_per_year:parseInt(document.getElementById(`lp-${i}`).value)||p.days_per_year}));
  await api('/settings','PUT',{company_name:document.getElementById('s-co').value,pf_rate:document.getElementById('s-pf').value,tds_rate:document.getElementById('s-tds').value,leave_policy});
  const btn=event.target;btn.textContent='Saved ✓';btn.style.background='var(--g)';setTimeout(()=>{btn.textContent='Save settings';btn.style.background='';},1500);
}

          <div class="fg"><label>New password *</label><input type="password" id="cp-new" placeholder="Min 6 characters"></div>
          <div class="fg"><label>Confirm new password *</label><input type="password" id="cp-con" placeholder="Repeat new password"></div>

async function changePassword(){
  const cur=document.getElementById('cp-cur').value,np=document.getElementById('cp-new').value,con=document.getElementById('cp-con').value;
  if(!cur||!np||!con){showToast('All fields required','error');return;}
  if(np!==con){showToast('New passwords do not match','error');return;}
  if(np.length<6){showToast('Min 6 characters','error');return;}
  await api('/auth/change-password','POST',{current_password:cur,new_password:np});
  showToast('Password updated ✓');
  document.getElementById('cp-cur').value='';document.getElementById('cp-new').value='';document.getElementById('cp-con').value='';
}

// ── MODAL HELPER ─────────────────────────────────────────────────────────────
function showModal(title,body,buttons){
  document.getElementById('modal-h').innerHTML=`${title}<button class="btn btn-sm" style="margin-left:auto" onclick="closeModal()">✕</button>`;
  document.getElementById('modal-b').innerHTML=body;
  document.getElementById('modal-f').innerHTML=buttons.map(([label,action])=>{
    const cls=label.toLowerCase().includes('cancel')?'btn':'btn btn-p';
    return`<button class="${cls}" onclick="${action}">${label}</button>`;
  }).join('');
  document.getElementById('modal-bg').classList.add('open');
}
function openModal(){document.getElementById('modal-bg').classList.add('open');}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
function closePanel(){document.getElementById('panel').classList.remove('open');if(panelInt){clearInterval(panelInt);panelInt=null;}}
